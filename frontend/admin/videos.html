<!doctype html><html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>إدارة الفيديوهات — لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <script src="/components/tailwind.config.js"></script><script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/components/layout.css">
  <style>#sidebar-container{min-width:256px}@media(min-width:768px){.md\:mr-64{margin-right:256px}}.ai{width:100%;background:#111412;border:1px solid #44474c;border-radius:.5rem;padding:.75rem 1rem;color:#e2e3df;outline:none}.ai:focus{border-color:#e6c364}</style>
</head>
<body class="dark bg-background text-on-background custom-scrollbar" data-page="admin-videos">
  <div id="sidebar-container" data-mode="admin"></div>
  <div class="md:mr-64 min-h-screen p-6 md:p-10">
    <div class="flex justify-between items-center mb-8">
      <div><h1 class="font-amiri text-3xl">إدارة الفيديوهات</h1><p class="text-on-surface-variant text-sm mt-1">رفع وإدارة المقاطع المرئية والمحاضرات</p></div>
      <button onclick="openForm()" class="flex items-center gap-2 px-5 py-3 bg-secondary text-on-secondary rounded-xl font-semibold hover-gold-glow"><span class="material-symbols-outlined">add</span> إضافة فيديو</button>
    </div>
    <div class="bg-surface-container rounded-2xl border border-outline-variant overflow-hidden">
      <table class="w-full text-sm"><thead class="border-b border-outline-variant bg-surface-container-high"><tr>
        <th class="text-right px-5 py-4 text-on-surface-variant">العنوان</th>
        <th class="text-right px-5 py-4 text-on-surface-variant">الفئة</th>
        <th class="text-right px-5 py-4 text-on-surface-variant">المصدر</th>
        <th class="text-right px-5 py-4 text-on-surface-variant">إجراءات</th>
      </tr></thead><tbody id="videos-tbody"><tr><td colspan="4" class="px-5 py-8 text-center text-on-surface-variant">جاري التحميل...</td></tr></tbody></table>
    </div>
  </div>

  <div id="form-modal" class="hidden fixed inset-0 z-50 bg-background/80 backdrop-blur-sm flex items-start justify-center p-4 overflow-y-auto">
    <div class="bg-surface-container border border-outline-variant rounded-2xl w-full max-w-2xl my-8 p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 id="form-title" class="font-amiri text-2xl text-secondary">إضافة فيديو</h2>
        <button onclick="closeForm()"><span class="material-symbols-outlined text-on-surface-variant">close</span></button>
      </div>
      <form id="video-form" class="flex flex-col gap-4" enctype="multipart/form-data">
        <input type="hidden" id="edit-slug">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="text-sm text-on-surface-variant mb-1 block">Slug*</label><input id="f-slug" name="slug" class="ai" required></div>
          <div><label class="text-sm text-on-surface-variant mb-1 block">الفئة*</label>
            <select id="f-category" name="category" class="ai"><option value="محاضرات">محاضرات</option><option value="حضرات">حضرات</option><option value="مناسبات">مناسبات</option></select>
          </div>
        </div>
        <div><label class="text-sm text-on-surface-variant mb-1 block">العنوان*</label><input id="f-title" name="title" class="ai" required></div>
        <div><label class="text-sm text-on-surface-variant mb-1 block">الوصف</label><textarea id="f-description" name="description" rows="3" class="ai resize-none"></textarea></div>
        <div><label class="text-sm text-on-surface-variant mb-1 block">المدة</label><input id="f-duration" name="duration" class="ai" placeholder="1:45:00"></div>
        <div class="bg-surface-container-high rounded-xl p-4 border border-outline-variant">
          <p class="text-sm font-medium mb-3">المصدر (اختر واحداً)</p>
          <div><label class="text-sm text-on-surface-variant mb-1 block">معرف يوتيوب (مثال: dQw4w9WgXcQ)</label><input id="f-youtube" name="youtubeId" class="ai" placeholder="معرف الفيديو من الرابط"></div>
          <p class="text-xs text-on-surface-variant text-center my-2">— أو —</p>
          <div><label class="text-sm text-on-surface-variant mb-1 block">رفع ملف فيديو (MP4)</label><input name="videoFile" type="file" accept="video/*" class="ai file:bg-secondary file:text-on-secondary file:border-0 file:rounded-lg file:px-4 file:py-2 file:ml-2"></div>
        </div>
        <div><label class="text-sm text-on-surface-variant mb-1 block">صورة مصغرة</label><input name="thumbnail" type="file" accept="image/*" class="ai file:bg-secondary file:text-on-secondary file:border-0 file:rounded-lg file:px-4 file:py-2 file:ml-2"></div>
        <div class="flex items-center gap-3"><input id="f-featured" name="featured" type="checkbox" class="w-5 h-5 accent-yellow-400"><label for="f-featured" class="text-sm text-on-surface-variant">مميز</label></div>
        <div id="form-error" class="hidden text-error text-sm bg-error-container/20 border border-error/30 rounded-xl px-4 py-3"></div>
        <button type="submit" class="py-3 bg-secondary text-on-secondary rounded-xl font-semibold hover-gold-glow"><span id="submit-text">حفظ</span></button>
      </form>
    </div>
  </div>

  <script src="/components/layout.js"></script>
  <script>
  const token=()=>localStorage.getItem('bayoumiyya_token');const authH=()=>({Authorization:`Bearer ${token()}`});let editMode=false;
  async function load(){
    try{const d=await fetch('/api/videos').then(r=>r.json());
    document.getElementById('videos-tbody').innerHTML=d.length?d.map(v=>`<tr class="border-b border-outline-variant hover:bg-surface-container-high">
      <td class="px-5 py-4"><div class="font-medium">${v.title}</div><div class="text-xs text-on-surface-variant">${v.slug}</div></td>
      <td class="px-5 py-4"><span class="text-xs px-2 py-1 rounded-full bg-secondary-container text-on-secondary-container">${v.category}</span></td>
      <td class="px-5 py-4 text-xs text-on-surface-variant">${v.youtubeId?'YouTube':v.videoFile?'ملف محلي':'لا يوجد'}</td>
      <td class="px-5 py-4 flex gap-2">
        <button onclick='openForm(${JSON.stringify(v).replace(/'/g,"&#39;")})' class="p-2 rounded-lg hover:bg-surface-container-highest text-secondary"><span class="material-symbols-outlined text-sm">edit</span></button>
        <button onclick="del('${v.slug}')" class="p-2 rounded-lg hover:bg-error-container/30 text-error"><span class="material-symbols-outlined text-sm">delete</span></button>
      </td></tr>`).join(''):'<tr><td colspan="4" class="px-5 py-8 text-center text-on-surface-variant">لا توجد فيديوهات</td></tr>';}
    catch{document.getElementById('videos-tbody').innerHTML='<tr><td colspan="4" class="text-center py-8 text-error">تعذر التحميل</td></tr>';}}
  window.openForm=(item=null)=>{editMode=!!item;document.getElementById('form-title').textContent=item?'تعديل الفيديو':'إضافة فيديو';document.getElementById('edit-slug').value=item?.slug||'';document.getElementById('f-slug').value=item?.slug||'';document.getElementById('f-slug').readOnly=!!item;document.getElementById('f-title').value=item?.title||'';document.getElementById('f-category').value=item?.category||'محاضرات';document.getElementById('f-description').value=item?.description||'';document.getElementById('f-duration').value=item?.duration||'';document.getElementById('f-youtube').value=item?.youtubeId||'';document.getElementById('f-featured').checked=!!item?.featured;document.getElementById('form-error').classList.add('hidden');document.getElementById('form-modal').classList.remove('hidden');};
  window.closeForm=()=>document.getElementById('form-modal').classList.add('hidden');
  document.getElementById('video-form').onsubmit=async e=>{e.preventDefault();const errEl=document.getElementById('form-error');errEl.classList.add('hidden');document.getElementById('submit-text').textContent='جاري الحفظ...';const slug=document.getElementById('edit-slug').value||document.getElementById('f-slug').value;const fd=new FormData(e.target);fd.set('featured',document.getElementById('f-featured').checked?'true':'false');try{const res=await fetch(editMode?`/api/videos/${slug}`:'/api/videos',{method:editMode?'PUT':'POST',headers:authH(),body:fd});const d=await res.json();if(!res.ok)throw new Error(d.error||'خطأ');closeForm();load();showToast(editMode?'تم التعديل ✓':'تمت الإضافة ✓');}catch(err){errEl.textContent=err.message;errEl.classList.remove('hidden');}document.getElementById('submit-text').textContent='حفظ';};
  window.del=async slug=>{if(!confirm('حذف هذا الفيديو؟'))return;const r=await fetch(`/api/videos/${slug}`,{method:'DELETE',headers:authH()});if(r.ok){load();showToast('تم الحذف');}else showToast('فشل الحذف','error');};
  function showToast(m,t='success'){const el=document.createElement('div');el.className=`fixed top-4 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full text-sm shadow-lg ${t==='error'?'bg-error-container text-on-error-container':'bg-secondary text-on-secondary'}`;el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),3000);}
  document.addEventListener('DOMContentLoaded',load);
  </script>
</body></html>
