<!doctype html><html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>إدارة الصوتيات — لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <script src="/components/tailwind.config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/components/layout.css">
  <style>#sidebar-container{min-width:256px}@media(min-width:768px){.md\:mr-64{margin-right:256px}}.admin-input{width:100%;background:#111412;border:1px solid #44474c;border-radius:.5rem;padding:.75rem 1rem;color:#e2e3df;outline:none}.admin-input:focus{border-color:#e6c364}</style>
</head>
<body class="dark bg-background text-on-background custom-scrollbar" data-page="admin-audio">
  <div id="sidebar-container" data-mode="admin"></div>
  <div class="md:mr-64 min-h-screen p-6 md:p-10">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="font-amiri text-3xl text-on-surface">إدارة الصوتيات</h1>
        <p class="text-on-surface-variant text-sm mt-1">رفع وإدارة المقاطع الصوتية والأناشيد</p>
      </div>
      <button onclick="openForm()" class="flex items-center gap-2 px-5 py-3 bg-secondary text-on-secondary rounded-xl font-semibold hover-gold-glow">
        <span class="material-symbols-outlined">add</span> إضافة مقطع
      </button>
    </div>
    <div class="bg-surface-container rounded-2xl border border-outline-variant overflow-hidden">
      <table class="w-full text-sm">
        <thead class="border-b border-outline-variant bg-surface-container-high">
          <tr>
            <th class="text-right px-5 py-4 text-on-surface-variant">العنوان</th>
            <th class="text-right px-5 py-4 text-on-surface-variant">المنشد</th>
            <th class="text-right px-5 py-4 text-on-surface-variant">الفئة</th>
            <th class="text-right px-5 py-4 text-on-surface-variant">ملف</th>
            <th class="text-right px-5 py-4 text-on-surface-variant">إجراءات</th>
          </tr>
        </thead>
        <tbody id="audio-tbody"><tr><td colspan="5" class="px-5 py-8 text-center text-on-surface-variant">جاري التحميل...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div id="form-modal" class="hidden fixed inset-0 z-50 bg-background/80 backdrop-blur-sm flex items-start justify-center p-4 overflow-y-auto">
    <div class="bg-surface-container border border-outline-variant rounded-2xl w-full max-w-2xl my-8 p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 id="form-title" class="font-amiri text-2xl text-secondary">إضافة مقطع صوتي</h2>
        <button onclick="closeForm()"><span class="material-symbols-outlined text-on-surface-variant">close</span></button>
      </div>
      <form id="audio-form" class="flex flex-col gap-4" enctype="multipart/form-data">
        <input type="hidden" id="edit-slug">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="text-sm text-on-surface-variant mb-1 block">Slug*</label><input id="f-slug" name="slug" class="admin-input" required></div>
          <div><label class="text-sm text-on-surface-variant mb-1 block">الفئة*</label>
            <select id="f-category" name="category" class="admin-input">
              <option value="أذكار">أذكار</option><option value="إنشاد">إنشاد</option><option value="قصائد">قصائد</option>
            </select>
          </div>
        </div>
        <div><label class="text-sm text-on-surface-variant mb-1 block">العنوان*</label><input id="f-title" name="title" class="admin-input" required></div>
        <div><label class="text-sm text-on-surface-variant mb-1 block">المنشد / المؤدي</label><input id="f-artist" name="artist" class="admin-input"></div>
        <div><label class="text-sm text-on-surface-variant mb-1 block">المدة</label><input id="f-duration" name="duration" class="admin-input" placeholder="45:20"></div>
        <div><label class="text-sm text-on-surface-variant mb-1 block">ملف الصوت (MP3/OGG)</label><input name="audioFile" type="file" accept="audio/*" class="admin-input file:bg-secondary file:text-on-secondary file:border-0 file:rounded-lg file:px-4 file:py-2 file:ml-2"></div>
        <div><label class="text-sm text-on-surface-variant mb-1 block">صورة مصغرة</label><input name="thumbnail" type="file" accept="image/*" class="admin-input file:bg-secondary file:text-on-secondary file:border-0 file:rounded-lg file:px-4 file:py-2 file:ml-2"></div>
        <div class="flex items-center gap-3">
          <input id="f-featured" name="featured" type="checkbox" class="w-5 h-5 accent-yellow-400">
          <label for="f-featured" class="text-sm text-on-surface-variant">مميز (يظهر أولاً)</label>
        </div>
        <div id="form-error" class="hidden text-error text-sm bg-error-container/20 border border-error/30 rounded-xl px-4 py-3"></div>
        <button type="submit" class="py-3 bg-secondary text-on-secondary rounded-xl font-semibold hover-gold-glow"><span id="submit-text">حفظ</span></button>
      </form>
    </div>
  </div>

  <script src="/components/layout.js"></script>
  <script>
  const token = () => localStorage.getItem('bayoumiyya_token');
  const authH = () => ({Authorization:`Bearer ${token()}`});
  let editMode = false;

  async function loadAudio() {
    try {
      const data = await fetch('/api/audio').then(r=>r.json());
      document.getElementById('audio-tbody').innerHTML = data.length ? data.map(t=>`
        <tr class="border-b border-outline-variant hover:bg-surface-container-high transition-colors">
          <td class="px-5 py-4"><div class="font-medium">${t.title}</div><div class="text-xs text-on-surface-variant">${t.slug}</div></td>
          <td class="px-5 py-4 text-on-surface-variant">${t.artist||'—'}</td>
          <td class="px-5 py-4"><span class="text-xs px-2 py-1 rounded-full bg-secondary-container text-on-secondary-container">${t.category}</span></td>
          <td class="px-5 py-4">${t.audioFile?'<span class="material-symbols-outlined text-secondary text-sm">check_circle</span>':'<span class="text-on-surface-variant text-xs">لا</span>'}</td>
          <td class="px-5 py-4 flex gap-2">
            <button onclick='openForm(${JSON.stringify(t).replace(/'/g,"&#39;")})' class="p-2 rounded-lg hover:bg-surface-container-highest text-secondary"><span class="material-symbols-outlined text-sm">edit</span></button>
            <button onclick="deleteItem('${t.slug}')" class="p-2 rounded-lg hover:bg-error-container/30 text-error"><span class="material-symbols-outlined text-sm">delete</span></button>
          </td>
        </tr>`).join('') : '<tr><td colspan="5" class="px-5 py-8 text-center text-on-surface-variant">لا توجد مقاطع بعد</td></tr>';
    } catch { document.getElementById('audio-tbody').innerHTML='<tr><td colspan="5" class="px-5 py-8 text-center text-error">تعذر التحميل</td></tr>'; }
  }

  window.openForm = (item=null) => {
    editMode = !!item;
    document.getElementById('form-title').textContent  = item ? 'تعديل المقطع' : 'إضافة مقطع صوتي';
    document.getElementById('edit-slug').value         = item?.slug||'';
    document.getElementById('f-slug').value            = item?.slug||'';
    document.getElementById('f-slug').readOnly         = !!item;
    document.getElementById('f-title').value           = item?.title||'';
    document.getElementById('f-artist').value          = item?.artist||'';
    document.getElementById('f-category').value        = item?.category||'أذكار';
    document.getElementById('f-duration').value        = item?.duration||'';
    document.getElementById('f-featured').checked      = !!item?.featured;
    document.getElementById('form-error').classList.add('hidden');
    document.getElementById('form-modal').classList.remove('hidden');
  };
  window.closeForm = () => document.getElementById('form-modal').classList.add('hidden');

  document.getElementById('audio-form').onsubmit = async e => {
    e.preventDefault();
    const errEl = document.getElementById('form-error'); errEl.classList.add('hidden');
    document.getElementById('submit-text').textContent = 'جاري الحفظ...';
    const slug = document.getElementById('edit-slug').value || document.getElementById('f-slug').value;
    const fd   = new FormData(e.target);
    fd.set('featured', document.getElementById('f-featured').checked ? 'true' : 'false');
    try {
      const res = await fetch(editMode?`/api/audio/${slug}`:'/api/audio',{method:editMode?'PUT':'POST',headers:authH(),body:fd});
      const d   = await res.json();
      if (!res.ok) throw new Error(d.error||'خطأ');
      closeForm(); loadAudio(); showToast(editMode?'تم التعديل ✓':'تمت الإضافة ✓');
    } catch(err) { errEl.textContent=err.message; errEl.classList.remove('hidden'); }
    document.getElementById('submit-text').textContent = 'حفظ';
  };

  window.deleteItem = async slug => {
    if (!confirm('حذف هذا المقطع؟')) return;
    const res = await fetch(`/api/audio/${slug}`,{method:'DELETE',headers:authH()});
    if (res.ok) { loadAudio(); showToast('تم الحذف'); } else showToast('فشل الحذف','error');
  };

  function showToast(m,t='success'){const el=document.createElement('div');el.className=`fixed top-4 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full text-sm shadow-lg ${t==='error'?'bg-error-container text-on-error-container':'bg-secondary text-on-secondary'}`;el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),3000);}
  document.addEventListener('DOMContentLoaded', loadAudio);
  </script>
</body></html>
