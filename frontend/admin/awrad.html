<!doctype html><html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>إدارة الأوراد — لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Serif:wght@400;700&family=Source+Serif+4:wght@400;600&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <script src="/components/tailwind.config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/components/layout.css">
  <style>#sidebar-container{min-width:256px}@media(min-width:768px){.md\:mr-64{margin-right:256px}}</style>
</head>
<body class="dark bg-background text-on-background custom-scrollbar" data-page="admin-awrad">
  <div id="sidebar-container" data-mode="admin"></div>
  <div class="md:mr-64 min-h-screen p-6 md:p-10">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="font-amiri text-3xl text-on-surface">إدارة الأوراد</h1>
        <p class="text-on-surface-variant text-sm mt-1">إضافة وتعديل وحذف الأوراد والأذكار</p>
      </div>
      <button onclick="openForm()" class="flex items-center gap-2 px-5 py-3 bg-secondary text-on-secondary rounded-xl font-semibold hover-gold-glow transition-all">
        <span class="material-symbols-outlined">add</span> إضافة ورد
      </button>
    </div>

    <div id="awrad-table" class="bg-surface-container rounded-2xl border border-outline-variant overflow-hidden">
      <table class="w-full text-sm">
        <thead class="border-b border-outline-variant bg-surface-container-high">
          <tr>
            <th class="text-right px-5 py-4 text-on-surface-variant font-medium">العنوان</th>
            <th class="text-right px-5 py-4 text-on-surface-variant font-medium">الفئة</th>
            <th class="text-right px-5 py-4 text-on-surface-variant font-medium">الصوت</th>
            <th class="text-right px-5 py-4 text-on-surface-variant font-medium">الإجراءات</th>
          </tr>
        </thead>
        <tbody id="awrad-tbody"><tr><td colspan="4" class="px-5 py-8 text-center text-on-surface-variant">جاري التحميل...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Form Modal -->
  <div id="form-modal" class="hidden fixed inset-0 z-50 bg-background/80 backdrop-blur-sm flex items-start justify-center p-4 overflow-y-auto">
    <div class="bg-surface-container border border-outline-variant rounded-2xl w-full max-w-2xl my-8 p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 id="form-title" class="font-amiri text-2xl text-secondary">إضافة ورد جديد</h2>
        <button onclick="closeForm()" class="text-on-surface-variant hover:text-on-surface">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <form id="wird-form" class="flex flex-col gap-4" enctype="multipart/form-data">
        <input type="hidden" id="edit-slug">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm text-on-surface-variant mb-1 block">Slug (معرف)*</label>
            <input id="f-slug" name="slug" class="admin-input" placeholder="wird-sabahi" required>
          </div>
          <div>
            <label class="text-sm text-on-surface-variant mb-1 block">الفئة*</label>
            <select id="f-category" name="category" class="admin-input">
              <option value="يومي">يومي</option>
              <option value="أسبوعي">أسبوعي</option>
              <option value="أساسي">أساسي</option>
            </select>
          </div>
        </div>
        <div>
          <label class="text-sm text-on-surface-variant mb-1 block">العنوان*</label>
          <input id="f-title" name="title" class="admin-input" required>
        </div>
        <div>
          <label class="text-sm text-on-surface-variant mb-1 block">الوصف</label>
          <input id="f-description" name="description" class="admin-input">
        </div>
        <div>
          <label class="text-sm text-on-surface-variant mb-1 block">المدة (مثال: 15:30)</label>
          <input id="f-duration" name="duration" class="admin-input" placeholder="15:30">
        </div>
        <div>
          <label class="text-sm text-on-surface-variant mb-1 block">النص الكامل</label>
          <textarea id="f-text" name="text" rows="6" class="admin-input resize-none"></textarea>
        </div>
        <div>
          <label class="text-sm text-on-surface-variant mb-1 block">ملف الصوت (MP3)</label>
          <input id="f-audio" name="audioFile" type="file" accept="audio/*" class="admin-input file:bg-secondary file:text-on-secondary file:border-0 file:rounded-lg file:px-4 file:py-2 file:mr-2">
        </div>
        <div id="form-error" class="hidden text-error text-sm bg-error-container/20 border border-error/30 rounded-xl px-4 py-3"></div>
        <button type="submit" class="py-3 bg-secondary text-on-secondary rounded-xl font-semibold hover-gold-glow transition-all">
          <span id="submit-text">حفظ</span>
        </button>
      </form>
    </div>
  </div>

  <style>
    .admin-input{width:100%;background:#111412;border:1px solid #44474c;border-radius:.5rem;padding:.75rem 1rem;color:#e2e3df;outline:none;transition:border-color .15s}
    .admin-input:focus{border-color:#e6c364}
  </style>
  <script src="/components/layout.js"></script>
  <script>
  const token = () => localStorage.getItem('bayoumiyya_token');
  const authH  = () => ({Authorization:`Bearer ${token()}`});
  let editMode = false;

  async function loadAwrad() {
    const tbody = document.getElementById('awrad-tbody');
    try {
      const data = await fetch('/api/awrad').then(r=>r.json());
      tbody.innerHTML = data.length ? data.map(w=>`
        <tr class="border-b border-outline-variant hover:bg-surface-container-high transition-colors">
          <td class="px-5 py-4">
            <div class="font-medium text-on-surface">${w.title}</div>
            <div class="text-xs text-on-surface-variant mt-0.5">${w.slug}</div>
          </td>
          <td class="px-5 py-4"><span class="text-xs px-2 py-1 rounded-full bg-secondary-container text-on-secondary-container">${w.category}</span></td>
          <td class="px-5 py-4">${w.audioFile?'<span class="material-symbols-outlined text-secondary text-sm">check_circle</span>':'<span class="text-on-surface-variant text-xs">لا</span>'}</td>
          <td class="px-5 py-4 flex gap-2">
            <button onclick='openForm(${JSON.stringify(w).replace(/'/g,"&#39;")})' class="p-2 rounded-lg hover:bg-surface-container-highest transition-colors text-secondary">
              <span class="material-symbols-outlined text-sm">edit</span>
            </button>
            <button onclick="deleteItem('${w.slug}')" class="p-2 rounded-lg hover:bg-error-container/30 transition-colors text-error">
              <span class="material-symbols-outlined text-sm">delete</span>
            </button>
          </td>
        </tr>`).join('') : '<tr><td colspan="4" class="px-5 py-8 text-center text-on-surface-variant">لا توجد أوراد بعد</td></tr>';
    } catch { tbody.innerHTML = '<tr><td colspan="4" class="px-5 py-8 text-center text-error">تعذر التحميل</td></tr>'; }
  }

  window.openForm = (item=null) => {
    editMode = !!item;
    document.getElementById('form-title').textContent = item ? 'تعديل الورد' : 'إضافة ورد جديد';
    document.getElementById('edit-slug').value       = item?.slug||'';
    document.getElementById('f-slug').value          = item?.slug||'';
    document.getElementById('f-slug').readOnly       = !!item;
    document.getElementById('f-title').value         = item?.title||'';
    document.getElementById('f-category').value      = item?.category||'يومي';
    document.getElementById('f-description').value   = item?.description||'';
    document.getElementById('f-duration').value      = item?.duration||'';
    document.getElementById('f-text').value          = item?.text||'';
    document.getElementById('form-error').classList.add('hidden');
    document.getElementById('form-modal').classList.remove('hidden');
  };
  window.closeForm = () => document.getElementById('form-modal').classList.add('hidden');

  document.getElementById('wird-form').onsubmit = async e => {
    e.preventDefault();
    const errEl = document.getElementById('form-error');
    errEl.classList.add('hidden');
    document.getElementById('submit-text').textContent = 'جاري الحفظ...';
    const slug = document.getElementById('edit-slug').value || document.getElementById('f-slug').value;
    const fd   = new FormData(e.target);
    try {
      const url    = editMode ? `/api/awrad/${slug}` : '/api/awrad';
      const method = editMode ? 'PUT' : 'POST';
      const res    = await fetch(url, { method, headers: authH(), body: fd });
      const data   = await res.json();
      if (!res.ok) throw new Error(data.error||'خطأ في الحفظ');
      closeForm(); loadAwrad(); showToast(editMode?'تم التعديل ✓':'تمت الإضافة ✓');
    } catch(err) { errEl.textContent=err.message; errEl.classList.remove('hidden'); }
    document.getElementById('submit-text').textContent = 'حفظ';
  };

  window.deleteItem = async (slug) => {
    if (!confirm('هل أنت متأكد من الحذف؟')) return;
    try {
      const res = await fetch(`/api/awrad/${slug}`,{method:'DELETE',headers:authH()});
      if (!res.ok) throw new Error('فشل الحذف');
      loadAwrad(); showToast('تم الحذف');
    } catch(e) { showToast(e.message,'error'); }
  };

  function showToast(msg,type='success'){const t=document.createElement('div');t.className=`fixed top-4 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full text-sm shadow-lg ${type==='error'?'bg-error-container text-on-error-container':'bg-secondary text-on-secondary'}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}

  document.addEventListener('DOMContentLoaded', loadAwrad);
  </script>
</body></html>
