<!doctype html><html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>الأوراد — الطريقة البيومية الأحمدية</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Serif:wght@400;700&family=Source+Serif+4:wght@400;600&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <script src="/components/tailwind.config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/components/layout.css">
  <style>#sidebar-container{min-width:256px}@media(min-width:768px){.md\:mr-64{margin-right:256px}}</style>
</head>
<body class="dark bg-background text-on-background custom-scrollbar" data-page="awrad">
  <div id="sidebar-container"></div>
  <div class="md:mr-64 min-h-screen flex flex-col">
    <main class="flex-1 p-6 md:p-10 max-w-5xl w-full mx-auto">

      <div class="mb-8">
        <h1 class="font-amiri text-4xl md:text-5xl text-secondary">الأوراد</h1>
        <p class="text-on-surface-variant mt-2">رياض من السكينة والطمأنينة، ننهل منها نوراً يضيء دروب قلوبنا.</p>
      </div>

      <!-- Filters -->
      <div class="flex flex-wrap gap-3 mb-8" id="filter-group">
        <button data-filter="كل" class="filter-btn active-filter px-5 py-2 rounded-full bg-secondary text-on-secondary font-medium transition-all">كل</button>
        <button data-filter="يومي" class="filter-btn px-5 py-2 rounded-full border border-outline-variant hover:border-secondary hover:text-secondary transition-all">يومي</button>
        <button data-filter="أسبوعي" class="filter-btn px-5 py-2 rounded-full border border-outline-variant hover:border-secondary hover:text-secondary transition-all">أسبوعي</button>
        <button data-filter="أساسي" class="filter-btn px-5 py-2 rounded-full border border-outline-variant hover:border-secondary hover:text-secondary transition-all">أساسي</button>
      </div>

      <!-- Grid -->
      <div id="awrad-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div class="animate-pulse bg-surface-container rounded-xl h-40"></div>
        <div class="animate-pulse bg-surface-container rounded-xl h-40"></div>
      </div>

      <!-- Wird Modal -->
      <div id="wird-modal" class="hidden fixed inset-0 z-50 bg-background/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-surface-container border border-secondary/30 rounded-2xl max-w-2xl w-full max-h-[85vh] overflow-y-auto p-8">
          <div class="flex justify-between items-start mb-6">
            <h2 id="modal-title" class="font-amiri text-2xl text-secondary"></h2>
            <button onclick="closeWirdModal()" class="text-on-surface-variant hover:text-on-surface">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <div id="modal-text" class="font-amiri text-xl leading-loose text-on-surface whitespace-pre-line"></div>
        </div>
      </div>
    </main>
    <div id="footer-container"></div>
  </div>
  <div id="mobile-nav-container"></div>
  <audio id="app-audio" preload="metadata"></audio>
  <!-- Player Bar -->
  <div id="audio-player-bar" class="hidden fixed bottom-16 md:bottom-0 left-0 right-0 md:mr-64 bg-surface-container border-t border-secondary/30 z-30 px-4 py-3">
    <div class="max-w-5xl mx-auto flex items-center gap-4">
      <button id="player-prev-btn" class="text-on-surface-variant hover:text-secondary"><span class="material-symbols-outlined">skip_next</span></button>
      <button id="player-play-btn" class="w-10 h-10 rounded-full bg-secondary text-on-secondary flex items-center justify-center hover-gold-glow">
        <span id="player-play-icon" class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">play_arrow</span>
      </button>
      <button id="player-next-btn" class="text-on-surface-variant hover:text-secondary"><span class="material-symbols-outlined">skip_previous</span></button>
      <div class="flex-1 min-w-0">
        <div id="player-title" class="text-sm font-semibold truncate"></div>
        <div class="flex items-center gap-2 mt-1">
          <span id="player-current-time" class="text-xs text-on-surface-variant w-10">0:00</span>
          <div id="player-progress-container" class="flex-1 h-1.5 bg-surface-variant rounded-full cursor-pointer relative">
            <div id="player-progress-fill" class="absolute inset-y-0 right-0 bg-secondary rounded-full" style="width:0%"></div>
          </div>
          <span id="player-total-time" class="text-xs text-on-surface-variant w-10 text-left">0:00</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/components/layout.js"></script>
  <script src="/components/audio-player.js"></script>
  <script>
  let allAwrad = [];

  function openWirdModal(wird) {
    document.getElementById('modal-title').textContent = wird.title;
    document.getElementById('modal-text').textContent  = wird.text || 'النص غير متاح حالياً';
    document.getElementById('wird-modal').classList.remove('hidden');
  }
  window.closeWirdModal = () => document.getElementById('wird-modal').classList.add('hidden');

  function renderCard(w) {
    const catColor = {يومي:'bg-primary-container text-on-primary-container', أسبوعي:'bg-secondary-container text-on-secondary-container', أساسي:'bg-tertiary-container text-on-tertiary-container'}[w.category] || 'bg-surface-variant text-on-surface-variant';
    return `
    <article id="${w.slug}" data-category="${w.category}" data-track-id="${w.slug}"
      data-src="${w.audioFile || ''}" data-title="${w.title}" data-artist="الطريقة البيومية"
      data-duration="${w.duration || ''}"
      class="p-6 bg-surface-container rounded-2xl border border-outline-variant hover:border-secondary/40 transition-colors">
      <div class="flex justify-between items-start mb-3">
        <span class="text-xs px-3 py-1 rounded-full ${catColor}">${w.category}</span>
        ${w.duration ? `<span class="text-xs text-on-surface-variant">${w.duration}</span>` : ''}
      </div>
      <h2 class="font-amiri text-xl text-on-surface mb-2">${w.title}</h2>
      <p class="text-sm text-on-surface-variant leading-relaxed line-clamp-3 mb-4">${w.description || ''}</p>
      <div class="flex gap-3">
        <button onclick='openWirdModal(${JSON.stringify(w).replace(/'/g,"&#39;")})'
          class="flex items-center gap-2 px-4 py-2 border border-outline-variant rounded-lg text-sm hover:border-secondary hover:text-secondary transition-colors">
          <span class="material-symbols-outlined text-sm">menu_book</span> اقرأ الورد
        </button>
        ${w.audioFile ? `
        <button class="play-track-btn flex items-center gap-2 px-4 py-2 bg-secondary text-on-secondary rounded-lg text-sm hover-gold-glow">
          <span class="material-symbols-outlined text-sm">play_circle</span> استماع
        </button>` : `
        <button class="flex items-center gap-2 px-4 py-2 border border-outline-variant rounded-lg text-sm opacity-50 cursor-not-allowed">
          <span class="material-symbols-outlined text-sm">music_off</span> قريباً
        </button>`}
      </div>
    </article>`;
  }

  function applyFilter(category) {
    const grid = document.getElementById('awrad-grid');
    const filtered = category === 'كل' ? allAwrad : allAwrad.filter(w => w.category === category);
    grid.innerHTML = filtered.length ? filtered.map(renderCard).join('') : '<p class="text-on-surface-variant col-span-2 py-8 text-center">لا توجد نتائج</p>';
    // Re-init audio player buttons
    if (typeof AudioPlayer !== 'undefined') {
      document.querySelectorAll('.play-track-btn').forEach((btn, i) => {
        btn.addEventListener('click', () => AudioPlayer.playByIndex(i));
      });
    }
    // Hash navigation
    if (window.location.hash) {
      const el = document.querySelector(window.location.hash);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    try {
      allAwrad = await API.get('/awrad');
      applyFilter('كل');
    } catch(e) {
      document.getElementById('awrad-grid').innerHTML = '<p class="text-on-surface-variant">تعذر تحميل الأوراد</p>';
    }
    // Filter buttons
    document.getElementById('filter-group').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active-filter','bg-secondary','text-on-secondary');
        b.classList.add('border','border-outline-variant');
      });
      btn.classList.add('active-filter','bg-secondary','text-on-secondary');
      btn.classList.remove('border','border-outline-variant');
      applyFilter(btn.dataset.filter);
    });
  });
  </script>
</body></html>
