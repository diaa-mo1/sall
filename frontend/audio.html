<!doctype html><html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>الصوتيات — الطريقة البيومية الأحمدية</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Serif:wght@400;700&family=Source+Serif+4:wght@400;600&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <script src="/components/tailwind.config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/components/layout.css">
  <style>#sidebar-container{min-width:256px}@media(min-width:768px){.md\:mr-64{margin-right:256px}}</style>
</head>
<body class="dark bg-background text-on-background custom-scrollbar" data-page="audio">
  <div id="sidebar-container"></div>
  <div class="md:mr-64 min-h-screen flex flex-col">
    <main class="flex-1 p-6 md:p-10 max-w-5xl w-full mx-auto pb-36">
      <div class="mb-8">
        <h1 class="font-amiri text-4xl md:text-5xl text-secondary">المكتبة الصوتية</h1>
        <p class="text-on-surface-variant mt-2">مكتبة شاملة تضم أوراد وإنشاد وقصائد لتعطير الأوقات بذكر الله والصلاة على رسوله الكريم ﷺ</p>
      </div>
      <div class="flex flex-wrap gap-3 mb-8" id="filter-group">
        <button data-filter="كل" class="filter-btn active-filter px-5 py-2 rounded-full bg-secondary text-on-secondary font-medium">كل</button>
        <button data-filter="أذكار" class="filter-btn px-5 py-2 rounded-full border border-outline-variant hover:border-secondary hover:text-secondary transition-all">أذكار</button>
        <button data-filter="إنشاد" class="filter-btn px-5 py-2 rounded-full border border-outline-variant hover:border-secondary hover:text-secondary transition-all">إنشاد</button>
        <button data-filter="قصائد" class="filter-btn px-5 py-2 rounded-full border border-outline-variant hover:border-secondary hover:text-secondary transition-all">قصائد</button>
      </div>
      <div id="audio-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div class="animate-pulse bg-surface-container rounded-xl h-36"></div>
        <div class="animate-pulse bg-surface-container rounded-xl h-36"></div>
      </div>
    </main>
    <div id="footer-container"></div>
  </div>
  <div id="mobile-nav-container"></div>
  <audio id="app-audio" preload="metadata"></audio>

  <!-- Persistent Player Bar -->
  <div id="audio-player-bar" class="hidden fixed bottom-16 md:bottom-0 left-0 right-0 md:mr-64 bg-surface-container border-t border-secondary/40 z-30 px-4 py-3 shadow-2xl">
    <div class="max-w-5xl mx-auto flex items-center gap-4">
      <div id="player-thumb" class="hidden md:flex w-12 h-12 rounded-lg bg-surface-container-high border border-outline-variant items-center justify-center flex-shrink-0">
        <span class="material-symbols-outlined text-secondary">music_note</span>
      </div>
      <div class="flex-1 min-w-0">
        <div id="player-title" class="text-sm font-semibold text-on-surface truncate">اختر مقطعاً للاستماع</div>
        <div id="player-artist" class="text-xs text-on-surface-variant truncate"></div>
      </div>
      <div class="flex items-center gap-3 flex-shrink-0">
        <button id="player-prev-btn" class="text-on-surface-variant hover:text-secondary transition-colors">
          <span class="material-symbols-outlined">skip_next</span>
        </button>
        <button id="player-play-btn" class="w-11 h-11 rounded-full bg-secondary text-on-secondary flex items-center justify-center hover-gold-glow transition-all">
          <span id="player-play-icon" class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">play_arrow</span>
        </button>
        <button id="player-next-btn" class="text-on-surface-variant hover:text-secondary transition-colors">
          <span class="material-symbols-outlined">skip_previous</span>
        </button>
      </div>
      <div class="hidden md:flex flex-col gap-1 flex-1 max-w-xs">
        <div id="player-progress-container" class="relative h-1.5 bg-surface-variant rounded-full cursor-pointer">
          <div id="player-progress-fill" class="absolute inset-y-0 right-0 bg-secondary rounded-full transition-all" style="width:0%"></div>
        </div>
        <div class="flex justify-between text-xs text-on-surface-variant">
          <span id="player-current-time">0:00</span>
          <span id="player-total-time">0:00</span>
        </div>
      </div>
      <div class="hidden md:block w-20">
        <div id="player-volume-container" class="relative h-1.5 bg-surface-variant rounded-full cursor-pointer">
          <div id="player-volume-fill" class="absolute inset-y-0 right-0 bg-secondary/70 rounded-full" style="width:80%"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/components/layout.js"></script>
  <script src="/components/audio-player.js"></script>
  <script>
  let allTracks = [];

  function renderTrack(t, idx) {
    const catLabel = {أذكار:'🔵',إنشاد:'🟡',قصائد:'🟣'}[t.category] || '⚪';
    const hasSrc = !!t.audioFile;
    return `
    <article data-track-id="${t.slug}" data-category="${t.category}"
      data-src="${t.audioFile||''}" data-title="${t.title}" data-artist="${t.artist||''}"
      data-duration="${t.duration||''}" data-thumbnail="${t.thumbnail||''}"
      class="p-5 bg-surface-container rounded-2xl border border-outline-variant hover:border-secondary/30 transition-colors group">
      <div class="flex items-start justify-between gap-3 mb-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-2">
            <span class="text-xs px-2 py-0.5 rounded-full bg-surface-container-high text-on-surface-variant">${catLabel} ${t.category}</span>
            ${t.duration ? `<span class="text-xs text-on-surface-variant">${t.duration}</span>` : ''}
          </div>
          <h2 class="font-semibold text-on-surface group-hover:text-secondary transition-colors line-clamp-2">${t.title}</h2>
          ${t.artist ? `<p class="text-sm text-on-surface-variant mt-1">${t.artist}</p>` : ''}
        </div>
        <div class="w-12 h-12 rounded-xl bg-secondary/10 border border-secondary/20 flex items-center justify-center flex-shrink-0">
          ${t.thumbnail ? `<img src="${t.thumbnail}" class="w-full h-full object-cover rounded-xl">` : '<span class="material-symbols-outlined text-secondary">music_note</span>'}
        </div>
      </div>
      ${hasSrc ? `
      <button class="play-track-btn w-full flex items-center justify-center gap-2 py-2.5 bg-secondary text-on-secondary rounded-xl text-sm font-medium hover-gold-glow transition-all">
        <span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1">play_circle</span> استماع
      </button>` : `
      <div class="w-full flex items-center justify-center gap-2 py-2.5 border border-outline-variant rounded-xl text-sm text-on-surface-variant opacity-60">
        <span class="material-symbols-outlined text-sm">music_off</span> الملف غير متاح بعد
      </div>`}
    </article>`;
  }

  function applyFilter(cat) {
    const grid = document.getElementById('audio-grid');
    const items = cat === 'كل' ? allTracks : allTracks.filter(t => t.category === cat);
    grid.innerHTML = items.length ? items.map(renderTrack).join('') : '<p class="text-on-surface-variant col-span-2 py-8 text-center">لا توجد نتائج</p>';
    if (typeof AudioPlayer !== 'undefined') AudioPlayer.init();
  }

  document.addEventListener('DOMContentLoaded', async () => {
    try {
      allTracks = await API.get('/audio');
      applyFilter('كل');
    } catch(e) {
      document.getElementById('audio-grid').innerHTML = '<p class="text-on-surface-variant">تعذر تحميل الصوتيات</p>';
    }
    document.getElementById('filter-group').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('bg-secondary','text-on-secondary');
        b.classList.add('border','border-outline-variant');
      });
      btn.classList.add('bg-secondary','text-on-secondary');
      btn.classList.remove('border','border-outline-variant');
      applyFilter(btn.dataset.filter);
    });
    // Autoplay from homepage
    try {
      const id = localStorage.getItem('nooraltareeq_autoplay');
      if (id) { localStorage.removeItem('nooraltareeq_autoplay'); setTimeout(() => AudioPlayer.playById(id), 600); }
    } catch {}
  });
  </script>
</body></html>
