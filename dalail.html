<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>دلائل الخيرات — الطريقة البيومية الأحمدية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Noto+Serif:wght@400;700&family=Source+Serif+4:ital,wght@0,400;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = window.tailwind.config || {};
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/al-bayoumiyya/components/layout.css">
    <style>#sidebar-container { min-width: 256px; } @media (min-width: 768px) { .md\:mr-64 { margin-right: 256px; } }</style>
  </head>
  <body class="dark bg-background custom-scrollbar" data-page="dalail">
    <div id="sidebar-container"></div>
    <main class="md:mr-64 min-h-screen p-8 container mx-auto">
      <section class="mb-8">
        <h1 class="text-display-lg font-amiri">دلائل الخيرات</h1>
        <p class="mt-4 text-on-surface-variant">نسخة من الكتاب قابلة للقراءة مع أدوات تكبير ونطق.</p>
      </section>

      <section class="grid gap-6 lg:grid-cols-[320px_minmax(0,1fr)]">
        <aside class="space-y-4 p-4 bg-surface-container rounded-3xl border border-outline-variant">
          <div class="flex items-center justify-between gap-3">
            <div>
              <h2 class="font-semibold">انتقل إلى حزب</h2>
              <p class="text-sm text-on-surface-variant">اختر حزباً للقراءة أو الاستماع.</p>
            </div>
            <button id="dalail-listen-btn" class="px-3 py-2 bg-secondary text-on-secondary rounded-xl flex items-center gap-2"><span class="material-symbols-outlined">play_circle</span>استماع</button>
          </div>

          <div class="space-y-3">
            <label class="text-sm font-medium">الفصل</label>
            <select id="dalail-hizb-dropdown" class="w-full rounded-xl border border-outline px-4 py-3 bg-background text-right"></select>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button id="dalail-prev-btn" class="px-4 py-3 rounded-xl border border-outline hover:bg-surface-container-high">السابق</button>
            <button id="dalail-next-btn" class="px-4 py-3 rounded-xl border border-outline hover:bg-surface-container-high">التالي</button>
          </div>

          <div class="space-y-3">
            <div class="flex items-center justify-between gap-3">
              <span class="text-sm font-medium">حجم النص</span>
              <div class="flex items-center gap-2">
                <button id="text_decrease" class="px-3 py-2 rounded-full border border-outline">-</button>
                <button id="text_increase" class="px-3 py-2 rounded-full border border-outline">+</button>
              </div>
            </div>
            <div class="px-4 py-3 rounded-2xl bg-surface-container-high text-sm text-on-surface-variant">يُحفظ الموضع والنص تلقائياً.</div>
          </div>
        </aside>

        <section class="space-y-6">
          <article class="p-6 bg-surface-container rounded-3xl border border-outline-variant" id="dalail-reader">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
              <div>
                <h2 id="dalail-hizb-title" class="text-xl font-semibold">عنوان الحزب</h2>
                <p class="text-sm text-on-surface-variant">النص يظهر هنا مع تنسيق للعربية.</p>
              </div>
              <div class="text-sm text-on-surface-variant">حفظ تلقائي للقراءة</div>
            </div>
            <div id="dalail-hizb-text" class="prose prose-rose max-w-none text-right leading-8"></div>
          </article>

          <div class="grid gap-4 sm:grid-cols-2" id="dalail-chapters-grid"></div>
        </section>
      </section>
    </main>
    <div id="mobile-nav-container"></div>
    <div id="footer-container"></div>
    <script src="/al-bayoumiyya/components/layout.js"></script>
    <script src="/al-bayoumiyya/components/dalail.js"></script>
  </body>
</html>
